services:
  - type: web
    name: staff-attendance-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && npm ci --omit=dev
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker backend.main:app --timeout 120
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      - key: SUPER_ADMIN_JWT_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_PLAN_ID
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: PYTHONPATH
        value: "."
  - type: static
    name: staff-attendance-super-admin
    rootDir: super-admin-dashboard
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://staff-attendance-api.onrender.com
