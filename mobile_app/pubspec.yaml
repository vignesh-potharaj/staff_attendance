name: smart_attendance_app
description: "A new Flutter project for Smart Staff Attendance."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # State Management & DI
  flutter_riverpod: ^2.5.1
  
  # Networking
  dio: ^5.4.3+1
  shared_preferences: ^2.2.3
  
  # Device APIs
  camera: ^0.10.5+9
  geolocator: ^11.0.1
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  
  # UI & Formatting
  intl: ^0.19.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
